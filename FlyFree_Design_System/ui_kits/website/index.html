<!-- @dsCard group="Website" viewport="1280x800" name="Homepage" subtitle="FlyFree Urban website — full interactive homepage" -->
<!-- @startingPoint section="Website" subtitle="FlyFree Urban homepage — nav, hero, products, features, footer" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlyFree Urban — Muévete Libre</title>
  <link rel="stylesheet" href="../../styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #0C0C0C; color: #FFFFFF; font-family: 'Futura Std', 'Century Gothic', sans-serif; }
    a { text-decoration: none; }
    input::placeholder { color: #383838; }
    input:focus { outline: none; }
    @keyframes heroIn   { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
    @keyframes heroFade { from { opacity:0; } to { opacity:1; } }
    @keyframes marquee  { from { transform:translateX(0); } to { transform:translateX(-50%); } }
    .h-eye   { animation: heroFade 0.5s ease          both 0.05s; opacity:0; }
    .h-line1 { animation: heroIn  0.75s cubic-bezier(0.16,1,0.3,1) both 0.2s;  opacity:0; }
    .h-line2 { animation: heroIn  0.75s cubic-bezier(0.16,1,0.3,1) both 0.4s;  opacity:0; }
    .h-serif { animation: heroFade 0.7s ease          both 0.65s; opacity:0; }
    .h-cta   { animation: heroIn  0.6s ease          both 0.85s; opacity:0; }
    .h-stats { animation: heroFade 0.6s ease          both 1.1s;  opacity:0; }
    @media (prefers-reduced-motion: reduce) {
      .h-eye,.h-line1,.h-line2,.h-serif,.h-cta,.h-stats { animation:none; opacity:1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const NS = window.FlyFreeUrbanDesignSystem_3c4997 || {};
    const { NavBar, Button, Badge, Card, Input } = NS;

    /* ═══════════════════════════════════════════════════════════════
       NAV
    ═══════════════════════════════════════════════════════════════ */
    const NAV_LINKS = [
      { label: 'Patines',     href: '#patines' },
      { label: 'Scooters',    href: '#scooters' },
      { label: 'Cascos',      href: '#cascos' },
      { label: 'Accesorios',  href: '#accesorios' },
      { label: 'Nosotros',    href: '#nosotros' },
    ];

    function FFNav() {
      const [hovIdx, setHovIdx] = React.useState(null);
      if (NavBar) {
        return <NavBar logoSrc="../../assets/logo.png" links={NAV_LINKS} ctaLabel="Mi Cuenta" ctaHref="#cuenta" />;
      }
      return (
        <nav style={{background:'#0C0C0C',borderBottom:'1px solid #252525',position:'sticky',top:0,zIndex:100,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 3rem',height:'68px'}}>
          <img src="../../assets/logo.png" alt="FlyFree Urban" style={{height:'32px',objectFit:'contain'}} />
          <div style={{display:'flex',gap:'28px'}}>
            {NAV_LINKS.map((l,i) => (
              <a key={l.label} href={l.href}
                style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'11px',color:hovIdx===i?'#fff':'#737373',textTransform:'uppercase',letterSpacing:'0.12em',transition:'color .1s'}}
                onMouseEnter={()=>setHovIdx(i)} onMouseLeave={()=>setHovIdx(null)}>{l.label}</a>
            ))}
          </div>
          <a href="#cuenta" style={{padding:'9px 20px',background:'#F5C800',color:'#0C0C0C',fontFamily:'var(--font-display)',fontWeight:900,fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.12em',lineHeight:1}}>Mi Cuenta</a>
        </nav>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════════════════════════ */
    function FFHero() {
      const Btn = Button;
      return (
        <section id="hero" style={{background:'#0C0C0C',position:'relative',overflow:'hidden'}}>
          <div style={{maxWidth:'1280px',margin:'0 auto',display:'flex',minHeight:'640px'}}>

            {/* ── Left: Content ── */}
            <div style={{flex:'0 0 54%',display:'flex',flexDirection:'column',justifyContent:'center',padding:'80px clamp(1.5rem,4vw,4rem)',zIndex:2}}>
              <div className="h-eye" style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'28px'}}>  
                <span style={{color:'#F5C800',fontFamily:'var(--font-display)',fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.15em'}}>
                  «« Nueva Colección 2026 »»
                </span>
              </div>

              <h1 style={{fontFamily:'var(--font-display)',fontWeight:900,textTransform:'uppercase',lineHeight:1,margin:'0 0 28px',letterSpacing:'-0.02em'}}>
                <span className="h-line1" style={{display:'block',fontSize:'clamp(52px,5.5vw,80px)',color:'#FFFFFF'}}>MUÉVETE</span>
                <span className="h-line2" style={{display:'block',fontSize:'clamp(52px,5.5vw,80px)',color:'#F5C800'}}>LIBRE.</span>
              </h1>

              <p className="h-serif" style={{fontFamily:"'Playfair Display', Georgia, serif",fontStyle:'italic',fontWeight:400,fontSize:'21px',color:'#737373',lineHeight:1.6,marginBottom:'36px',maxWidth:'420px',letterSpacing:'0.01em'}}>
                Patines y equipo urbano de alto rendimiento, para quienes definen su propio camino.
              </p>

              <div className="h-cta" style={{display:'flex',gap:'12px',flexWrap:'wrap'}}>
                {Btn ? (
                  <>
                    <Btn variant="primary"   size="lg">Comprar Ahora</Btn>
                    <Btn variant="secondary" size="lg">Ver Catálogo →</Btn>
                  </>
                ) : (
                  <>
                    <a href="#" style={{padding:'15px 30px',background:'#F5C800',color:'#0C0C0C',fontFamily:'var(--font-display)',fontWeight:900,fontSize:'13px',textTransform:'uppercase',letterSpacing:'0.1em'}}>Comprar Ahora</a>
                    <a href="#" style={{padding:'15px 30px',background:'transparent',color:'#F5C800',border:'2px solid #F5C800',fontFamily:'var(--font-display)',fontWeight:900,fontSize:'13px',textTransform:'uppercase',letterSpacing:'0.1em'}}>Ver Catálogo →</a>
                  </>
                )}
              </div>

              <div className="h-stats" style={{display:'flex',gap:'40px',marginTop:'52px',borderTop:'1px solid #252525',paddingTop:'32px'}}>
                {[['500+','Productos'],['10+','Años'],['5★','Rating']].map(([n,l]) => (
                  <div key={l}>
                    <div style={{fontFamily:'var(--font-condensed)',fontWeight:900,fontSize:'34px',color:l==='Rating'?'#F5C800':'#FFFFFF',lineHeight:1}}>{n}</div>
                    <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'10px',color:'#525252',textTransform:'uppercase',letterSpacing:'0.12em',marginTop:'4px'}}>{l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* ── Right: Image ── */}
            <div style={{flex:1,position:'relative',overflow:'hidden'}}>
              <img src="../../assets/lifestyle-skates.jpg" alt="FlyFree Urban" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'30% top',display:'block',filter:'grayscale(15%) brightness(0.65) contrast(1.1)'}} />
              <div style={{position:'absolute',inset:0,background:'linear-gradient(to right, #0C0C0C 0%, rgba(12,12,12,0.1) 50%, transparent 100%)'}} />
              {/* Product badge */}
              <div style={{position:'absolute',bottom:'32px',right:'32px',background:'#F5C800',padding:'14px 20px'}}>
                <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.12em',color:'#0C0C0C',marginBottom:'2px'}}>Más Vendido</div>
                <div style={{fontFamily:'var(--font-condensed)',fontWeight:900,fontSize:'24px',textTransform:'uppercase',color:'#0C0C0C',lineHeight:1}}>RS600</div>
              </div>
            </div>

          </div>
        </section>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       MARQUEE
    ═══════════════════════════════════════════════════════════════ */
    const MARQUEE_TEXT = 'MUÉVETE LIBRE  ·  RS600  ·  NUEVA COLECCIÓN  ·  VUELA SIN LÍMITES  ·  RUEDA EN TU CIUDAD  ·  FLYFREE URBAN  ·  EQUIPO PREMIUM  ·  ';
    function FFMarquee() {
      return (
        <div style={{overflow:'hidden',padding:'13px 0',background:'#141414',borderTop:'1px solid #1C1C1C',borderBottom:'1px solid #1C1C1C'}}>
          <div style={{display:'flex',animation:'marquee 34s linear infinite',width:'max-content',willChange:'transform'}}>
            <span style={{fontFamily:'var(--font-condensed)',fontWeight:900,fontSize:'13px',textTransform:'uppercase',letterSpacing:'0.14em',color:'#FFFFFF',whiteSpace:'nowrap',paddingRight:'0'}}>{MARQUEE_TEXT}</span>
            <span style={{fontFamily:'var(--font-condensed)',fontWeight:900,fontSize:'13px',textTransform:'uppercase',letterSpacing:'0.14em',color:'#FFFFFF',whiteSpace:'nowrap'}}>{MARQUEE_TEXT}</span>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       PRODUCTS
    ═══════════════════════════════════════════════════════════════ */
    const PRODUCTS = [
      { title:'Stark Street X', subtitle:'Patines inline · Purple Edition', tag:'Inline', price:'$3,290 MXN', hot:'Nuevo', img:'../../assets/product-skate-purple.jpg', imgBg:'#F4F3EE' },
      { title:'Stark Street X', subtitle:'Patines inline · White Speckled', tag:'Inline', price:'$3,290 MXN', hot:null,    img:'../../assets/product-skate-white.jpg',  imgBg:'#F4F3EE' },
      { title:'GÜD Matt Negro', subtitle:'Casco urbano multi-impacto',      tag:'Cascos', price:'$890 MXN',   hot:null,    img:'../../assets/product-helmet-gud.webp',  imgBg:'#F0EFEA' },
      { title:'Alaska Rider',   subtitle:'Mochila Porta-Rollers 10L',       tag:'Accesorios', price:'$1,490 MXN', hot:null, img:'../../assets/product-bag-alaska-graffiti.jpg', imgBg:'#F4F3EE' },
    ];

    function FFProducts() {
      const CardC  = Card;
      const BadgeC = Badge;
      return (
        <div id="patines">
          {/* Announcement bar */}
          <div style={{background:'#F5C800',padding:'10px 20px',textAlign:'center'}}>
            <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'11px',textTransform:'uppercase',letterSpacing:'0.15em',color:'#0C0C0C'}}>
              ENVÍO GRATIS EN COMPRAS +$1,500 · NUEVA COLECCIÓN 2026 · DEVOLUCIONES GRATUITAS 30 DÍAS
            </span>
          </div>

          {/* Products */}
          <section style={{maxWidth:'1280px',margin:'0 auto',padding:'80px clamp(1.5rem,4vw,4rem)'}}>
            <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:'36px'}}>
              <div>
                <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'11px',color:'#F5C800',textTransform:'uppercase',letterSpacing:'0.18em',marginBottom:'6px'}}>Destacados</div>
                <h2 style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:'40px',color:'#FFFFFF',textTransform:'uppercase',letterSpacing:'-0.01em'}}>Más Vendidos</h2>
              </div>
              <a href="#" style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'11px',color:'#737373',textTransform:'uppercase',letterSpacing:'0.12em'}}>
                Ver Catálogo →
              </a>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px'}}>
              {PRODUCTS.map(p => {
                const bdg = p.hot && BadgeC
                  ? <BadgeC variant={p.hot==='Nuevo'?'yellow':'electric'} size="sm">{p.hot}</BadgeC>
                  : null;
                return CardC ? (
                  <CardC
                    key={p.title + p.subtitle}
                    variant="product"
                    title={p.title}
                    subtitle={p.subtitle}
                    tag={p.tag}
                    priceFormatted={p.price}
                    badge={bdg}
                    image={p.img}
                  />
                ) : (
                  <div key={p.title} style={{background:'#1C1C1C',border:'1px solid #252525',padding:'20px'}}>
                    <div style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:'18px',color:'#fff',textTransform:'uppercase'}}>{p.title}</div>
                    <div style={{color:'#737373',fontSize:'13px',marginTop:'4px'}}>{p.subtitle}</div>
                    <div style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:'20px',color:'#fff',marginTop:'12px'}}>{p.price}</div>
                  </div>
                );
              })}
            </div>
          </section>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       FEATURES + BRAND STATEMENT + NEWSLETTER
    ═══════════════════════════════════════════════════════════════ */
    const FEATURES = [
      { icon: '→', title: 'Envío Gratis',            desc: 'En compras mayores a $1,500 MXN. Entrega en 3–5 días hábiles a todo México.' },
      { icon: '◈', title: 'Garantía 1 Año',          desc: 'Todos nuestros productos incluyen garantía directa del fabricante por 12 meses.' },
      { icon: '✦', title: 'Asesoría Personalizada',  desc: 'Nuestro equipo de expertos te ayuda a elegir el equipo perfecto para tu nivel y estilo.' },
    ];

    function FFFeatures() {
      const [email, setEmail] = React.useState('');
      const [sent, setSent]   = React.useState(false);
      const Btn  = Button;
      const CardC = Card;
      const Inp  = Input;

      return (
        <div>
          {/* Brand statement */}
          <section style={{background:'#0C0C0C',borderTop:'1px solid #252525',padding:'96px clamp(1.5rem,4vw,4rem)'}}>
            <div style={{maxWidth:'1280px',margin:'0 auto',display:'flex',alignItems:'center',gap:'80px',flexWrap:'wrap'}}>
              <div style={{flex:'0 0 auto'}}>
                <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'11px',color:'#F5C800',textTransform:'uppercase',letterSpacing:'0.18em',marginBottom:'16px'}}>Nuestra filosofía</div>
                <h2 style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:'clamp(44px,4.5vw,68px)',color:'#FFFFFF',textTransform:'uppercase',letterSpacing:'-0.02em',lineHeight:1,margin:0}}>
                  EL PAVIMENTO<br />
                  <span style={{color:'#F5C800'}}>ES TUYO.</span>
                </h2>
                <p style={{fontFamily:"'Playfair Display', Georgia, serif",fontStyle:'italic',fontWeight:400,fontSize:'19px',color:'#525252',lineHeight:1.6,marginTop:'18px',maxWidth:'340px'}}>
                  — para quienes se mueven diferente.
                </p>
              </div>
              <div style={{flex:1,minWidth:'260px'}}>
                <p style={{fontFamily:'var(--font-body)',fontWeight:300,fontSize:'16px',color:'#737373',lineHeight:1.75,margin:'0 0 28px'}}>
                  Desde 2012 equipamos a los atletas urbanos de México con el mejor equipo de patinaje del mundo. No vendemos productos — compartimos una forma de ver la ciudad.
                </p>
                {Btn ? (
                  <Btn variant="ghost" size="md">Conoce Nuestra Historia →</Btn>
                ) : (
                  <a href="#" style={{color:'#F5C800',fontFamily:'var(--font-display)',fontWeight:700,fontSize:'12px',textTransform:'uppercase',letterSpacing:'0.1em'}}>Conoce Nuestra Historia →</a>
                )}
              </div>
            </div>
          </section>

          {/* Features grid */}
          <section style={{background:'#0C0C0C',borderTop:'1px solid #1C1C1C'}}>
            <div style={{maxWidth:'1280px',margin:'0 auto',padding:'72px clamp(1.5rem,4vw,4rem)'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'2px'}}>
                {FEATURES.map(f => CardC ? (
                  <CardC
                    key={f.title}
                    variant="feature"
                    title={f.title}
                    description={f.desc}
                    icon={<span style={{fontSize:'18px'}}>{f.icon}</span>}
                  />
                ) : (
                  <div key={f.title} style={{background:'#1C1C1C',padding:'32px',border:'1px solid #252525'}}>
                    <div style={{fontSize:'18px',color:'#F5C800',marginBottom:'16px'}}>{f.icon}</div>
                    <div style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:'14px',color:'#fff',textTransform:'uppercase',marginBottom:'8px'}}>{f.title}</div>
                    <div style={{fontFamily:'var(--font-body)',fontSize:'13px',color:'#737373',lineHeight:1.6}}>{f.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Newsletter */}
          <section style={{background:'#141414',borderTop:'1px solid #252525',borderBottom:'1px solid #252525'}}>
            <div style={{maxWidth:'1280px',margin:'0 auto',padding:'64px clamp(1.5rem,4vw,4rem)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'40px',flexWrap:'wrap'}}>
              <div>
                <h3 style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:'28px',color:'#FFFFFF',textTransform:'uppercase',letterSpacing:'-0.01em',margin:'0 0 8px'}}>
                  Mantente en movimiento.
                </h3>
                <p style={{fontFamily:'var(--font-body)',fontWeight:300,fontSize:'14px',color:'#525252',margin:0}}>
                  Nuevos productos, drops exclusivos y contenido de la comunidad.
                </p>
              </div>
              {sent ? (
                <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'13px',color:'#F5C800',textTransform:'uppercase',letterSpacing:'0.1em'}}>
                  ¡Gracias! Estás dentro. →
                </div>
              ) : (
                <div style={{display:'flex',gap:'0',flexShrink:0}}>
                  {Inp ? (
                    <Inp type="email" placeholder="tu@email.com" value={email} onChange={e=>setEmail(e.target.value)} size="lg" />
                  ) : (
                    <input type="email" placeholder="tu@email.com" value={email} onChange={e=>setEmail(e.target.value)}
                      style={{padding:'16px 20px',background:'#181818',border:'2px solid #252525',color:'#fff',fontSize:'15px',outline:'none',minWidth:'280px',fontFamily:'var(--font-body)'}} />
                  )}
                  {Btn ? (
                    <Btn variant="primary" size="lg" onClick={()=>email&&setSent(true)}>Suscribir</Btn>
                  ) : (
                    <button onClick={()=>email&&setSent(true)} style={{padding:'16px 28px',background:'#F5C800',color:'#0C0C0C',border:'none',fontFamily:'var(--font-display)',fontWeight:900,fontSize:'13px',textTransform:'uppercase',letterSpacing:'0.1em',cursor:'pointer'}}>Suscribir</button>
                  )}
                </div>
              )}
            </div>
          </section>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════════════════════ */
    const FOOTER_LINKS = {
      'Tienda':   ['Inline Skates','Quad Skates','Scooters','Cascos','Accesorios'],
      'Empresa':  ['Nosotros','Blog','Comunidad','Trabaja con Nosotros'],
      'Soporte':  ['Guía de Tallas','Envíos','Devoluciones','Garantías','Contacto'],
    };

    function FFFooter() {
      const [hov, setHov] = React.useState(null);
      return (
        <footer style={{background:'#0C0C0C',borderTop:'1px solid #1C1C1C',padding:'64px clamp(1.5rem,4vw,4rem) 32px'}}>
          <div style={{maxWidth:'1280px',margin:'0 auto'}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:'48px',marginBottom:'52px'}}>

              {/* Brand */}
              <div>
                <img src="../../assets/logo.png" alt="FlyFree Urban" style={{height:'38px',objectFit:'contain',display:'block',marginBottom:'24px'}} />
                <p style={{fontFamily:'var(--font-body)',fontWeight:300,fontSize:'13px',color:'#525252',lineHeight:1.75,maxWidth:'280px',marginBottom:'24px'}}>
                  La tienda especializada en patines y equipo urbano de alto rendimiento. Desde 2012 en México.
                </p>
                <div style={{display:'flex',gap:'16px'}}>
                  {['Instagram','TikTok','YouTube'].map(s => (
                    <a key={s} href="#" style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'10px',color:'#383838',textTransform:'uppercase',letterSpacing:'0.1em'}}
                      onMouseEnter={e=>e.target.style.color='#737373'} onMouseLeave={e=>e.target.style.color='#383838'}>{s}</a>
                  ))}
                </div>
              </div>

              {/* Links */}
              {Object.entries(FOOTER_LINKS).map(([group,links]) => (
                <div key={group}>
                  <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'10px',color:'#F5C800',textTransform:'uppercase',letterSpacing:'0.18em',marginBottom:'16px'}}>{group}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                    {links.map(l => (
                      <a key={l} href="#"
                        style={{fontFamily:'var(--font-body)',fontWeight:300,fontSize:'13px',color:hov===group+l?'#959595':'#525252',transition:'color .1s'}}
                        onMouseEnter={()=>setHov(group+l)} onMouseLeave={()=>setHov(null)}>{l}</a>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            {/* Bottom bar */}
            <div style={{borderTop:'1px solid #1C1C1C',paddingTop:'24px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px',flexWrap:'wrap'}}>
              <span style={{fontFamily:'var(--font-display)',fontWeight:300,fontSize:'11px',color:'#383838'}}>
                © 2026 FlyFree Urban. Todos los derechos reservados.
              </span>
              <div style={{display:'flex',gap:'24px'}}>
                {['Privacidad','Términos','Cookies'].map(l => (
                  <a key={l} href="#" style={{fontFamily:'var(--font-display)',fontWeight:300,fontSize:'11px',color:'#383838'}}
                    onMouseEnter={e=>e.target.style.color='#737373'} onMouseLeave={e=>e.target.style.color='#383838'}>{l}</a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ═══════════════════════════════════════════════════════════════
