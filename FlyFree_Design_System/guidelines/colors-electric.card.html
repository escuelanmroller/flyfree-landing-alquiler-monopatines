<!-- @dsCard group="Colors" viewport="700x140" name="Electric Accents" subtitle="High-energy neon accent — sales, urgency, electric moments" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--color-neutral-950); font-family: var(--font-display); }
    .wrap { display: flex; height: 140px; gap: 2px; padding: 2px; }
    .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px 16px; }
    .label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 3px; }
    .hex { font-size: 11px; font-weight: 300; opacity: 0.75; }
    .note { font-size: 10px; margin-top: 6px; opacity: 0.55; font-weight: 300; text-transform: none; letter-spacing: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="swatch" style="background:#C8FF00; flex:1.6;">
      <span class="label" style="color:#0C0C0C;">Electric</span>
      <span class="hex" style="color:#0C0C0C;">#C8FF00 — --color-brand-electric</span>
      <span class="note" style="color:#0C0C0C;">Sale badges · High urgency · Energy moments</span>
    </div>
    <div class="swatch" style="background:#D8FF44;">
      <span class="label" style="color:#0C0C0C;">Hover</span>
      <span class="hex" style="color:#0C0C0C;">#D8FF44</span>
    </div>
    <div class="swatch" style="background:#AADD00;">
      <span class="label" style="color:#0C0C0C;">Active</span>
      <span class="hex" style="color:#0C0C0C;">#AADD00</span>
    </div>
    <div class="swatch" style="background:#1C1C1C; border:1px solid #C8FF00; flex:1.4;">
      <span class="label" style="color:#C8FF00;">Electric Outline</span>
      <span class="hex" style="color:#C8FF00;">On dark surface</span>
    </div>
  </div>
</body>
</html>
