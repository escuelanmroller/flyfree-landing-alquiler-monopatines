<!-- @dsCard group="Brand" viewport="700x190" name="Logo" subtitle="FLYFREE URBAN wordmark — dark, light, and yellow contexts" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #181818; font-family: var(--font-display); }
    .wrap  { display: flex; height: 190px; }
    .panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 24px 20px; }
    .lbl   { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- On Dark: logo requires white backing — black text can't sit on black -->
    <div class="panel" style="background:#0C0C0C; border-right:1px solid #252525;">
      <div style="background:#FFFFFF; padding:10px 20px; display:inline-flex; align-items:center; justify-content:center;">
        <img src="../assets/logo.png" alt="FlyFree Urban"
             style="height:52px; object-fit:contain; max-width:220px;">
      </div>
      <span class="lbl" style="color:#525252;">On Dark · Use white container</span>
    </div>

    <!-- On Off-White: transparent PNG, full brand colors show -->
    <div class="panel" style="background:#F4F3EE; border-right:1px solid #D5D5D5;">
      <img src="../assets/logo.png" alt="FlyFree Urban"
           style="height:58px; object-fit:contain; max-width:240px;">
      <span class="lbl" style="color:#B8B8B8;">On Off-White · Primary</span>
    </div>

    <!-- On Yellow: use all-black version (filter:brightness(0)) for contrast -->
    <div class="panel" style="background:#F5C800;">
      <img src="../assets/logo.png" alt="FlyFree Urban"
           style="height:58px; object-fit:contain; max-width:240px; filter:brightness(0);">
      <span class="lbl" style="color:rgba(12,12,12,0.45);">On Yellow · All-black version</span>
    </div>

  </div>
</body>
</html>
