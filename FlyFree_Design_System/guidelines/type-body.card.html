<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--color-neutral-950); padding: 20px 28px; display: flex; flex-direction: column; gap: 14px; }
    .row { display: flex; align-items: baseline; gap: 20px; }
    .specimen { flex: 1; }
    .meta { font-family: var(--font-display); font-size: 9px; font-weight: 700; color: #525252; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="row">
    <p class="specimen" style="font-family:var(--font-body); font-weight:300; font-size:16px; color:#fff; line-height:1.5;">El pavimento es tuyo. Patines diseñados para la ciudad real, para quienes se mueven diferente.</p>
    <span class="meta">Book · 300 · 16px</span>
  </div>
  <div class="row">
    <p class="specimen" style="font-family:var(--font-body); font-weight:400; font-size:14px; color:#959595; line-height:1.5;">Envío gratis en compras mayores a $1,500 MXN. Devoluciones gratuitas en 30 días.</p>
    <span class="meta">Medium · 400 · 14px</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-family:var(--font-display); font-weight:700; font-size:11px; color:#F5C800; text-transform:uppercase; letter-spacing:0.15em;">Patines Inline · Nuevo Arribo · Más Vendido</span>
    <span class="meta">Bold · 700 · 11px · Label</span>
  </div>
</body>
</html>
