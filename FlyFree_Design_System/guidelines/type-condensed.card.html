<!DOCTYPE html>
<html lang="en">
<head>

    body { background: var(--color-neutral-950); padding: 24px 32px; }
  </style>
</head>

  <div style="display:flex; align-items:baseline; gap:16px; line-height:1; margin-bottom:12px;">

    <div style="flex:1; height:1px; background:#252525;"></div>
    <span style="font-family:var(--font-display); font-size:10px; font-weight:300; color:#525252;">--font-condensed · --font-weight-heavy</span>
