<!-- @dsCard group="Colors" viewport="700x150" name="Neutral Scale" subtitle="10-step gray ramp from near-black to near-white" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--color-neutral-800); font-family: var(--font-display); }
    .wrap { display: flex; height: 150px; }
    .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 8px 10px; }
    .step { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .hex  { font-size: 8px; font-weight: 300; margin-top: 2px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="swatch" style="background:#0C0C0C;">
      <span class="step" style="color:#737373;">950</span>
      <span class="hex"  style="color:#737373;">#0C0C0C</span>
    </div>
    <div class="swatch" style="background:#181818;">
      <span class="step" style="color:#737373;">900</span>
      <span class="hex"  style="color:#737373;">#181818</span>
    </div>
    <div class="swatch" style="background:#252525;">
      <span class="step" style="color:#737373;">800</span>
      <span class="hex"  style="color:#737373;">#252525</span>
    </div>
    <div class="swatch" style="background:#383838;">
      <span class="step" style="color:#737373;">700</span>
      <span class="hex"  style="color:#737373;">#383838</span>
    </div>
    <div class="swatch" style="background:#525252;">
      <span class="step" style="color:#B8B8B8;">600</span>
      <span class="hex"  style="color:#B8B8B8;">#525252</span>
    </div>
    <div class="swatch" style="background:#737373;">
      <span class="step" style="color:#EBEBEB;">500</span>
      <span class="hex"  style="color:#EBEBEB;">#737373</span>
    </div>
    <div class="swatch" style="background:#959595;">
      <span class="step" style="color:#0C0C0C;">400</span>
      <span class="hex"  style="color:#0C0C0C;">#959595</span>
    </div>
    <div class="swatch" style="background:#B8B8B8;">
      <span class="step" style="color:#0C0C0C;">300</span>
      <span class="hex"  style="color:#0C0C0C;">#B8B8B8</span>
    </div>
    <div class="swatch" style="background:#D5D5D5;">
      <span class="step" style="color:#0C0C0C;">200</span>
      <span class="hex"  style="color:#0C0C0C;">#D5D5D5</span>
    </div>
    <div class="swatch" style="background:#EBEBEB;">
      <span class="step" style="color:#0C0C0C;">100</span>
      <span class="hex"  style="color:#0C0C0C;">#EBEBEB</span>
    </div>
    <div class="swatch" style="background:#F4F4F2;">
      <span class="step" style="color:#0C0C0C;">50</span>
      <span class="hex"  style="color:#0C0C0C;">#F4F4F2</span>
    </div>
  </div>
</body>
</html>
