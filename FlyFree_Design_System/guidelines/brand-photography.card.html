<!-- @dsCard group="Brand" viewport="700x200" name="Photography Style" subtitle="Image treatment — dark, desaturated, high-contrast urban action" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--color-neutral-950); font-family: var(--font-display); }
    .wrap { display: flex; height: 200px; gap: 2px; }
    .panel { flex: 1; position: relative; overflow: hidden; }
    .panel img { width: 100%; height: 100%; object-fit: cover; }
    .panel .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; background: linear-gradient(to top, rgba(12,12,12,0.8) 0%, transparent 50%); }
    .tag { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #F5C800; margin-bottom: 3px; }
    .desc { font-size: 10px; font-weight: 300; color: #B8B8B8; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <img src="../assets/lifestyle-skates.jpg" style="filter:grayscale(20%) brightness(0.75) contrast(1.1);">
      <div class="overlay">
        <div class="tag">Editorial</div>
        <div class="desc">Desaturado · Alto contraste · Oscuro</div>
      </div>
    </div>
    <div class="panel">
      <img src="../assets/lifestyle-scooter.jpg" style="filter:none;">
      <div class="overlay">
        <div class="tag" style="color:#EF4444;">Avoid ✕</div>
        <div class="desc">Saturación completa — demasiado casual</div>
      </div>
    </div>
    <div class="panel" style="background:#0C0C0C; flex:0.6; display:flex; flex-direction:column; justify-content:center; padding:16px;">
      <div style="font-size:10px; font-weight:700; color:#F5C800; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:8px;">Rules</div>
      <div style="font-size:10px; font-weight:300; color:#737373; line-height:1.6;">
        grayscale(15-20%)<br>
        brightness(0.7–0.85)<br>
        contrast(1.05–1.15)<br>
        Overlay gradient for text
      </div>
    </div>
  </div>
</body>
</html>
